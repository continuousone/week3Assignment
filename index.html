<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>

        <div class="card">
            <img class="card-img" src="numbers.jpg" alt="Numbers scarted on a wall">
            <div class="card-content">
                <h1 class="card-title">Number Guessing Game</h1>
                <p class="card-body">Guess a number between 1 and 100!</p>
                <input type="number" id="guessInput" placeholder="Enter guess" min="1" max="100">

                <div class ="card-footer">
                    <div>
                        <p class="card-hint">Attempts</p>
                        <p class="card-read-time" id="attempts"><span> 0</span></p>
                        <p class="card-hint" id="hint">hint</p>
                    </div>
                    <button id="submit">Guess</button>

                </div>
            </div>
        </div>


    <script src="script.js" defer></script>
</body>
</html>
